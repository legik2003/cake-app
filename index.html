<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family: Arial;
background:#fff5f7;
text-align:center;
padding:20px;
}

h1{
color:#d94c7a;
}

.card{
background:white;
padding:20px;
margin:20px auto;
max-width:350px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:12px;
border:none;
background:#ff4f8b;
color:white;
font-size:16px;
border-radius:10px;
}

</style>
</head>

<body>
<h1>🍰 Каталог тортов</h1>
<div class="card">

<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587">

<h3>Шоколадный торт</h3>

<p>Вес: 1.5 кг</p>

<p>Цена: 45€</p>

<button onclick="order('Шоколадный торт')">Заказать</button>

</div>

<script>

let tg = window.Telegram.WebApp;
tg.expand();

function order(cake){
tg.sendData("Заказ: " + cake);
}

</script>

</body>
</html>
