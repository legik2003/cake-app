<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cake Shop</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.catalog{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:10px;
}

.price{
font-weight:bold;
margin-top:5px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
background:#4e8cff;
color:white;
border-radius:8px;
font-size:14px;
}

</style>

</head>

<body>

<h1>🍰 Каталог тортов</h1>

<div class="catalog">

<div class="card">
<img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587">
<div class="card-body">
<h3>Шоколадный торт</h3>
<p>1.5 кг</p>
<p class="price">45€</p>
<button>Заказать</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1559620192-032c4bc4674e">
<div class="card-body">
<h3>Клубничный торт</h3>
<p>2 кг</p>
<p class="price">55€</p>
<button>Заказать</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1603532648955-039310d9ed75">
<div class="card-body">
<h3>Свадебный торт</h3>
<p>3 кг</p>
<p class="price">120€</p>
<button>Заказать</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1563729784474-d77dbb933a9e">
<div class="card-body">
<h3>Ягодный торт</h3>
<p>2 кг</p>
<p class="price">60€</p>
<button>Заказать</button>
</div>
</div>

</div>

</body>
</html>
